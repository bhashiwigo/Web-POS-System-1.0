<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System - Bhashitha</title>

    <link rel="stylesheet" href="login.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

</head>
<body>
    <section id="login-screen" class="view-section active">
        <div class="background-img">
            <img src="Assets/_ (56).jpeg" alt="background-img" id="page-1-background">
        </div>
        <div class="login-wrapper glass-panel">
            <div class="login-left-panel">
                <h1 class="login-title"> <span class="highlight-text">Welcome Back</span> </h1>

                <form id="login-form">
                    <div class="input-field">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Enter Username" required>
                    </div>

                    <div class="input-field">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter Password" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Forget Password ?</a>
                    </div>

                    <button type="submit" class="login-btn">Log in</button>
                </form>
            </div>

            <div class="login-right">
                <img src="Assets/структура.jpeg" alt="glass-panel-img" id="glass-panel-img">
            </div>
        </div>
    </section>

    <section id="dashboard-screen" class="view-section">
        
    </section>

    <script src="login.js"></script>
</body>
</html>
